name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  # These values must match infra/aws/variables.tf (project_name, aws_region)
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: walking-dog-api

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
