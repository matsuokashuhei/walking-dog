name: Test Mobile

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "apps/mobile/.npmrc"
      - ".github/workflows/test-mobile.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "apps/mobile/.npmrc"
      - ".github/workflows/test-mobile.yml"

concurrency:
  group: test-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
