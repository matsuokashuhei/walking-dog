services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: walking_dog
      POSTGRES_PASSWORD: password
      POSTGRES_DB: walking_dog_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: dynamodb,s3
      AWS_DEFAULT_REGION: ap-northeast-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  cognito-local:
    image: jagregory/cognito-local:latest
    ports:
      - "9229:9229"
    volumes:
      - cognito_data:/app/.cognito

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app                          # ソースコードをマウント
      - cargo_cache:/usr/local/cargo    # cargoキャッシュを永続化
      - target_cache:/app/target        # ビルドキャッシュを永続化
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgres://walking_dog:password@postgres:5432/walking_dog_dev
      AWS_ENDPOINT_URL: http://localstack:4566
      COGNITO_ENDPOINT_URL: http://cognito-local:9229
    depends_on:
      - postgres
      - localstack
      - cognito-local

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"                     # Metro Bundler
      - "19000:19000"                   # Expo
      - "19001:19001"                   # Expo DevTools
      - "19002:19002"                   # Expo DevTools
    volumes:
      - ./mobile:/app                   # ソースコードをマウント
      - mobile_node_modules:/app/node_modules  # node_modulesを永続化
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      REACT_NATIVE_PACKAGER_HOSTNAME: "192.168.68.66"
      API_URL: http://api:3000
    depends_on:
      - api

  playwright:
    build:
      context: ./mobile/e2e
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./mobile/e2e:/app
      - ../logs:/logs                   # スクリーンショット保存先
    environment:
      BASE_URL: http://mobile:8081
      DISPLAY: ":99"
    ports:
      - "5900:5900"                     # VNC (headed モードの視覚確認用)
    depends_on:
      - mobile
    profiles:
      - e2e


volumes:
  postgres_data:
  localstack_data:
  cognito_data:
  cargo_cache:
  target_cache:
  mobile_node_modules:
