services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: walking_dog
      POSTGRES_PASSWORD: password
      POSTGRES_DB: walking_dog_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    user: root
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath /data
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/data

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ap-northeast-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  cognito-local:
    image: jagregory/cognito-local:latest
    ports:
      - "9229:9229"
    volumes:
      - ./cognito-local/db:/app/.cognito/db

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app                          # ソースコードをマウント
      - cargo_cache:/usr/local/cargo    # cargoキャッシュを永続化
      - target_cache:/app/target        # ビルドキャッシュを永続化
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgres://walking_dog:password@postgres:5432/walking_dog_dev
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      AWS_ENDPOINT_URL: http://localstack:4566
      COGNITO_ENDPOINT_URL: http://cognito-local:9229
      COGNITO_USER_POOL_ID: "local_2yovNmW0"
      COGNITO_CLIENT_ID: "418806fx3afm9cp1mdhxwpxw3"
    depends_on:
      - postgres
      - dynamodb-local
      - localstack
      - cognito-local


volumes:
  postgres_data:
  dynamodb_data:
  localstack_data:
  cargo_cache:
  target_cache:
