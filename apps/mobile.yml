services:
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"                     # Metro Bundler
      - "19000:19000"                   # Expo
      - "19001:19001"                   # Expo DevTools
      - "19002:19002"                   # Expo DevTools
    volumes:
      - ./mobile:/app                   # ソースコードをマウント
      - mobile_node_modules:/app/node_modules  # node_modulesを永続化
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      REACT_NATIVE_PACKAGER_HOSTNAME: "192.168.68.66"
      API_URL: http://192.168.68.66:3000
    depends_on:
      - api

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./e2e:/app
      - e2e_node_modules:/app/node_modules  # bind mount による上書きを防止
      - ./e2e/logs:/logs                 # スクリーンショット保存先
      - ./cognito-local/db:/cognito-db:ro  # 確認コード取得用
    environment:
      BASE_URL: http://mobile:8081
      API_BASE_URL: http://api:3000
      DISPLAY: ":99"
      COGNITO_ENDPOINT: http://cognito-local:9229
      COGNITO_USER_POOL_ID: "local_2yovNmW0"
    ports:
      - "5900:5900"                     # VNC (headed モードの視覚確認用)
    depends_on:
      - mobile
      - api
    profiles:
      - e2e

volumes:
  mobile_node_modules:
  e2e_node_modules:
