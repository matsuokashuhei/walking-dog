<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
body {
    font-family: "Inter", sans-serif;
    -webkit-font-smoothing: antialiased
    }
.map-container {
    background-image: linear-gradient(rgba(252, 249, 248, 0.1), rgba(252, 249, 248, 0.1)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuCvVFNVHB9WrNYnovi9RNGQX14GFhC16_cHd5INNB_UCf2FUC4N5tPrMIwet89W-mTGhcSB3krTavsXT7lhE2eUsN-hZcfs7rVJ8rhlZm1vHzAFV5bM08RUSVe7YMUvJu4whCyGzLZVZg4wTJT9qlXDAhheBKv2imIPnvTeFs9tZ3x3JmT6tJTNpnD4ZTzfucRdCiwJ7GNXidwoPxb9JbPHNAJevQ_PIlKRg14slL4akujyhuc7YpJHYDMsJ2vXxIcw4fspK9tGxSdO);
    background-size: cover;
    background-position: center;
    filter: grayscale(100%) contrast(1.1) brightness(0.9)
    }
.glass-effect {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="bg-[#fcf9f8]/80 dark:bg-black/80 backdrop-blur-xl text-black dark:text-white font-['Inter'] font-black tracking-tighter docked full-width top-0 sticky z-50 border-b border-gray-200/20 dark:border-gray-800/20 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="pets">pets</span>
<h1 class="text-xl font-black text-black dark:text-white tracking-tighter">Walking Dog</h1>
</div>
<div class="hidden md:flex gap-8">
<nav class="flex gap-6 text-gray-500 dark:text-gray-400 font-medium">
<a class="hover:opacity-70 transition-opacity" href="#">Home</a>
<a class="text-black dark:text-white font-bold transition-opacity" href="#">Walks</a>
<a class="hover:opacity-70 transition-opacity" href="#">Dogs</a>
<a class="hover:opacity-70 transition-opacity" href="#">Settings</a>
</nav>
</div>
<div class="w-6"></div> <!-- Spacer for leading balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-6 py-8 md:max-w-4xl md:mx-auto w-full">
<!-- Timer Section: Editorial Focus -->
<section class="flex flex-col items-center justify-center py-12">
<span class="label-sm uppercase tracking-[0.2em] text-on-surface-variant font-medium mb-4">Duration</span>
<h2 class="text-8xl md:text-9xl font-black tracking-tighter text-primary leading-none">24:15</h2>
</section>
<!-- Metrics Bento Grid -->
<section class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center border border-outline-variant/10">
<span class="text-[10px] uppercase tracking-[0.1em] text-on-surface-variant font-bold mb-1">Distance</span>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold tracking-tight">1.4</span>
<span class="text-sm font-medium text-on-surface-variant">km</span>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col items-center justify-center border border-outline-variant/10">
<span class="text-[10px] uppercase tracking-[0.1em] text-on-surface-variant font-bold mb-1">Avg Pace</span>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold tracking-tight">17'22"</span>
<span class="text-sm font-medium text-on-surface-variant">/km</span>
</div>
</div>
</section>
<!-- Map View: Monochrome Context -->
<section class="relative flex-grow min-h-[300px] mb-8 rounded-xl overflow-hidden border border-outline-variant/20 shadow-sm">
<div class="map-container absolute inset-0 w-full h-full" data-alt="Monochrome minimalist map view of a city street grid with a subtle dark path line showing the dog walking route." data-location="New York" style=""></div>
<!-- Overlay Stats -->
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<div class="bg-surface-container-lowest/90 glass-effect p-3 rounded-lg border border-outline-variant/20 shadow-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
<span class="text-[10px] font-bold tracking-wide uppercase">Central Park Trail</span>
</div>
</div>
<div class="bg-primary text-on-primary p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="my_location" style="font-variation-settings: 'FILL' 1;">my_location</span>
</div>
</div>
</section>
<!-- Transactional Actions: Clear Hierarchy -->
<footer class="mt-auto grid grid-cols-2 gap-4 pb-20 md:pb-8">
<button class="flex items-center justify-center py-5 px-8 rounded-xl border border-primary text-primary font-bold tracking-tight hover:bg-surface-container-high transition-colors text-lg active:scale-95 duration-200">
        Pause
      </button>
<button class="flex items-center justify-center py-5 px-8 rounded-xl bg-primary text-on-primary font-bold tracking-tight hover:opacity-90 transition-opacity text-lg active:scale-95 duration-200 shadow-xl">
        Finish
      </button>
</footer>
</main>
<!-- Mobile Bottom Navigation Shell -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-3 bg-[#fcf9f8]/90 dark:bg-black/90 backdrop-blur-2xl border-t border-gray-200/20 dark:border-gray-800/20 z-50">
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 p-2 hover:text-black dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-xl p-2 scale-110 shadow-lg" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Walks</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 p-2 hover:text-black dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="poodle">pets</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Dogs</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 p-2 hover:text-black dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Settings</span>
</a>
</nav>
</body></html>
