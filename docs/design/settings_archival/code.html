<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#FFFFFF",
                        "on-surface": "#1A1A1A",
                        "surface-container": "#F7F7F7",
                        "outline-variant": "#E5E5E5",
                        "secondary": "#6B6B6B"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        body { font-family: 'Inter', sans-serif; }
        .hairline-b { border-bottom: 0.5px solid #E5E5E5; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen pb-40">
<!-- TopAppBar: From COMPONENTS_19 -->
<header class="fixed top-0 w-full z-50 bg-[#FFFFFF]/80 backdrop-blur-xl border-b border-black/5">
<div class="flex items-center h-16 px-6 w-full">
<button class="material-symbols-outlined text-black hover:opacity-70 transition-opacity active:scale-95 duration-200">
            arrow_back
        </button>
<h1 class="ml-4 font-['Inter'] font-bold tracking-tighter uppercase text-sm text-black">SETTINGS</h1>
</div>
</header>
<main class="pt-24 px-8 max-w-2xl mx-auto">
<!-- Large, bold Title -->
<h2 class="text-5xl font-black tracking-tighter text-on-surface mb-16">Settings</h2>
<!-- SECTION: PROFILE -->
<div class="mb-14">
<h3 class="text-[10px] font-bold tracking-[0.15em] text-secondary uppercase mb-6 opacity-70">PROFILE</h3>
<div class="flex items-center justify-between h-[52px] hairline-b">
<span class="text-[15px] font-medium">Display Name</span>
<div class="flex items-center gap-2 group cursor-pointer active:opacity-60 transition-opacity">
<span class="text-[15px] text-secondary">matsuoka</span>
<span class="material-symbols-outlined text-secondary !text-[16px]">edit</span>
</div>
</div>
<div class="flex items-center justify-between h-[52px] hairline-b">
<span class="text-[15px] font-medium">Email Address</span>
<span class="text-[15px] text-secondary">h.matsuoka@archive.io</span>
</div>
</div>
<!-- SECTION: DOGS -->
<div class="mb-14">
<h3 class="text-[10px] font-bold tracking-[0.15em] text-secondary uppercase mb-6 opacity-70">DOGS</h3>
<div class="flex items-center h-[52px] hairline-b group cursor-pointer active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface mr-4">pets</span>
<div class="flex-1 flex flex-col">
<span class="text-[15px] font-semibold">Moka</span>
<span class="text-[12px] text-secondary">Shiba Inu</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
<div class="flex items-center h-[52px] hairline-b group cursor-pointer active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface mr-4">pets</span>
<div class="flex-1 flex flex-col">
<span class="text-[15px] font-semibold">Kona</span>
<span class="text-[12px] text-secondary">Labrador</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
</div>
<!-- SECTION: APPEARANCE -->
<div class="mb-16">
<h3 class="text-[10px] font-bold tracking-[0.15em] text-secondary uppercase mb-6 opacity-70">APPEARANCE</h3>
<!-- Segmented Control Row -->
<div class="flex items-center justify-between h-[64px] hairline-b">
<span class="text-[15px] font-medium">Theme</span>
<div class="flex p-1 bg-surface-container rounded-xl w-48">
<button class="flex-1 py-1.5 text-[11px] font-bold text-on-surface bg-white rounded-lg shadow-sm">Light</button>
<button class="flex-1 py-1.5 text-[11px] font-semibold text-secondary hover:text-on-surface transition-colors">Dark</button>
<button class="flex-1 py-1.5 text-[11px] font-semibold text-secondary hover:text-on-surface transition-colors">Auto</button>
</div>
</div>
<!-- Language Row -->
<div class="flex items-center justify-between h-[52px] hairline-b group cursor-pointer active:bg-surface-container transition-colors">
<span class="text-[15px] font-medium">Language</span>
<div class="flex items-center gap-1">
<span class="text-[15px] text-secondary">English</span>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 border border-outline-variant rounded-xl text-secondary text-[15px] font-bold hover:bg-surface-container transition-colors active:scale-[0.98] duration-200">
        Log Out
    </button>
<!-- Version Info -->
<p class="text-center mt-20 text-[10px] tracking-[0.2em] text-secondary font-bold uppercase opacity-50">VERSION 1.0.0</p>
</main>
<!-- BottomNavBar: From COMPONENTS_19 -->
<nav class="fixed bottom-0 w-full z-50 bg-[#FFFFFF]/80 backdrop-blur-xl border-t border-black/5 flex justify-around items-center h-20 px-4 pb-safe">
<div class="flex flex-col items-center justify-center text-neutral-400 hover:text-black transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-['Inter'] font-medium uppercase text-[10px] tracking-[0.05em]">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 hover:text-black transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined">directions_walk</span>
<span class="font-['Inter'] font-medium uppercase text-[10px] tracking-[0.05em]">Walks</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 hover:text-black transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined">pets</span>
<span class="font-['Inter'] font-medium uppercase text-[10px] tracking-[0.05em]">Dogs</span>
</div>
<!-- Active Tab: Settings -->
<div class="flex flex-col items-center justify-center text-black bg-black/5 rounded-xl px-4 py-1 active:scale-90 duration-150">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Inter'] font-medium uppercase text-[10px] tracking-[0.05em]">Settings</span>
</div>
</nav>
</body></html>
