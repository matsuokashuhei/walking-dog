<!-- Hero Header Section -->
<div class="mb-12">
<h1 class="text-5xl font-black tracking-tighter leading-[0.9] mb-4 text-primary">
                    Welcome back
                </h1>
<p class="text-on-surface-variant text-lg tracking-tight font-medium">
                    Sign in to access your companions' archive.
                </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-8">
<!-- Input Group: Email -->
<div class="flex flex-col gap-2">
<label class="font-['Inter'] text-[10px] font-bold uppercase tracking-[0.08em] text-on-surface-variant ml-1" for="email">
                        EMAIL ADDRESS
                    </label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 px-4 py-3.5 rounded-xl focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant/60" id="email" placeholder="your@email.com" type="email"/>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end ml-1">
<label class="font-['Inter'] text-[10px] font-bold uppercase tracking-[0.08em] text-on-surface-variant" for="password">
                            PASSWORD
                        </label>
<a class="text-[10px] font-bold uppercase tracking-[0.05em] text-outline hover:text-primary transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 px-4 py-3.5 rounded-xl focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant/60" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<div class="mt-4">
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl transition-all hover:bg-primary-container active:scale-[0.98] duration-200" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Secondary Actions -->
<div class="mt-12 pt-8 border-t border-outline-variant/20 text-center">
<p class="text-on-surface-variant text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="#">
                        Sign Up
                    </a>
</p>
</div>
</div>
