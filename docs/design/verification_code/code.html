<button class="hover:opacity-70 transition-opacity text-gray-500">

<input class="w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-bold bg-surface-container-lowest border border-[#E5E5E5] rounded-xl focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" placeholder="" type="text"/>
<input class="w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-bold bg-surface-container-lowest border border-[#E5E5E5] rounded-xl focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" placeholder="" type="text"/>

<input class="w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-bold bg-surface-container-lowest border border-[#E5E5E5] rounded-xl focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" placeholder="" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-bold text-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                    Verify
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Meta Links: Notion-inspired hierarchy -->
<div class="flex flex-col items-center gap-6 pt-4">
<button class="text-sm font-bold tracking-widest uppercase text-on-surface-variant hover:text-primary transition-colors">
                    Resend code
                </button>
<div class="w-full h-[1px] bg-outline-variant opacity-20"></div>
<div class="flex items-center gap-2 text-on-surface-variant/60 text-xs font-medium">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
